name: crypto-market-pipeline

services:
  kafka:
    image: apache/kafka:3.8.0
    container_name: cmp-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    container_name: cmp-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  ingester:
    build: { context: .., dockerfile: Dockerfile, args: { SERVICE: ingester } }
    container_name: cmp-ingester
    environment:
      KAFKA_BROKERS: kafka:9092
      SYMBOLS: "BTC-USD,ETH-USD,SOL-USD"
    depends_on:
      kafka: { condition: service_healthy }
    restart: unless-stopped

  processor:
    build: { context: .., dockerfile: Dockerfile, args: { SERVICE: processor } }
    container_name: cmp-processor
    environment:
      KAFKA_BROKERS: kafka:9092
      REDIS_ADDR: redis:6379
    depends_on:
      kafka: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped

  api:
    build: { context: .., dockerfile: Dockerfile, args: { SERVICE: api } }
    container_name: cmp-api
    environment:
      REDIS_ADDR: redis:6379
    ports:
      - "8080:8080"
    depends_on:
      redis: { condition: service_healthy }
    restart: unless-stopped
